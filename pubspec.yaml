name: puzzle_world
description: Jigsaw Puzzle Game

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  cupertino_icons: ^1.0.8

  audioplayers: ^6.5.0
  shared_preferences: ^2.5.3
  google_mobile_ads: ^6.0.0
  confetti: ^0.8.0


dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  flutter_native_splash: ^2.4.6



flutter:

  uses-material-design: true


  assets:

    - assets/images/Puzzle/

    - assets/images/background/

    - assets/images/ui/

    - assets/icon/



# إعداد أيقونة التطبيق

flutter_launcher_icons:

  android: true

  ios: false


  image_path: assets/icon/app_icon.png


  adaptive_icon_background: "#87CEEB"

  adaptive_icon_foreground: assets/icon/app_icon.png



# إعداد شاشة الإقلاع

flutter_native_splash:

  android: true

  ios: false


  color: "#87CEEB"

  image: assets/icon/app_icon.png


  android_12:

    color: "#87CEEB"

    image: assets/icon/app_icon.png


  fullscreen: true