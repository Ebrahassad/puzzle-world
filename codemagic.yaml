workflows:
  android-workflow:
    name: Puzzle World Android Release

    environment:
      flutter: 3.35.2

    scripts:

      - name: Clean project
        script: |
          flutter clean

      - name: Create local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get packages
        script: |
          flutter pub get

      - name: Check environment
        script: |
          flutter --version
          java -version
          cd android
          chmod +x gradlew
          ./gradlew --version
          cd ..

      - name: Check dependencies
        script: |
          flutter pub deps | grep audioplayers
          flutter pub deps | grep shared_preferences

      - name: Generate launcher icons
        script: |
          dart run flutter_launcher_icons

      - name: Generate native splash
        script: |
          dart run flutter_native_splash:create

      - name: Clean Android Gradle
        script: |
          cd android
          ./gradlew clean
          cd ..

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
          cd ..

      - name: Find APK
        script: |
          echo "Searching APK files..."
          find . -name "*.apk"

    artifacts:
      - "**/*.apk"