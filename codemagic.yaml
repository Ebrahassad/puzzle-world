workflows:
  android-workflow:
    name: Puzzle World Android Release

    environment:
      flutter: 3.35.2

    scripts:

      - name: Clean project
        script: |
          flutter clean

      - name: Create local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get packages
        script: |
          flutter pub get

      - name: Check environment
        script: |
          flutter --version
          java -version

      - name: Check dependencies
        script: |
          flutter pub deps | grep audioplayers
          flutter pub deps | grep shared_preferences

      - name: Generate launcher icons
        script: |
          dart run flutter_launcher_icons

      - name: Generate native splash
        script: |
          dart run flutter_native_splash:create

      - name: Build APK
        script: |
          flutter build apk --release -v || true

      - name: Check APK output
        script: |
          echo "Checking APK locations..."
          ls -la build/app/outputs/flutter-apk || true
          ls -la build/app/outputs/apk/release || true
          find build -name "*.apk" -print || true

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/release/*.apk